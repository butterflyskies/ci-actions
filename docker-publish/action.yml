# docker-publish — login, metadata, build-push with provenance/sbom/caching.
#
# Wraps the standard Docker build-publish pipeline with opinionated defaults
# for supply chain security (provenance attestation, SBOM, GHA cache).
# All transitive action references are SHA-pinned (see DEPS.lock).
name: Docker Publish
description: >
  Build and push a container image to GHCR with provenance attestation,
  SBOM generation, and GHA-backed layer caching.

inputs:
  registry:
    description: Container registry (e.g. "ghcr.io")
    required: false
    default: "ghcr.io"
  image:
    description: Image name without registry prefix (e.g. "butterflyskies/memory-mcp")
    required: true
  tag-rules:
    description: >
      docker/metadata-action tag rules, one per line.
      Defaults to branch ref + sha + latest-on-default-branch.
    required: false
    default: |
      type=ref,event=branch
      type=sha,prefix=sha-,format=long
      type=raw,value=latest,enable={{is_default_branch}}
  context:
    description: Docker build context path
    required: false
    default: "."
  push:
    description: Whether to push the image (set false for PR builds)
    required: false
    default: "true"
  # Auth — callers pass these from secrets.
  registry-username:
    description: Registry username (typically github.actor)
    required: true
  registry-password:
    description: Registry password (typically secrets.GITHUB_TOKEN)
    required: true

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Log in to container registry
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
      with:
        images: ${{ inputs.registry }}/${{ inputs.image }}
        tags: ${{ inputs.tag-rules }}

    - name: Build and push
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: ${{ inputs.context }}
        push: ${{ inputs.push }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        provenance: true
        sbom: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
