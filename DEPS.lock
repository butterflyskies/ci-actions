# DEPS.lock — Transitive dependency lockfile for ci-actions.
#
# This file records the expected SHA-256 digest of every action referenced
# by composite actions in this repository. The verify-deps workflow checks
# that each pinned commit still resolves to the same tree hash, catching
# silent tag rewrites (the attack vector Dan Lorenc described).
#
# Format: one entry per line.
#   <action>@<pinned-sha> <tree-sha256>
#
# To regenerate after updating a pin:
#   ./scripts/lock-deps.sh
#
# To verify (runs in CI):
#   ./scripts/verify-deps.sh

