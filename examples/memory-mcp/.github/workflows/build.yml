# Example: memory-mcp CI workflow after migrating to ci-actions.
# Compare with the original 130+ line build.yml.
name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE: butterflyskies/memory-mcp
  # Pin the ci-actions ref in one place — update here, not in every job.
  CI_ACTIONS_REF: main  # TODO: pin to SHA after first release

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: butterflyskies/ci-actions/setup-rust@main  # TODO: pin to SHA
        with:
          components: clippy,rustfmt
          cargo-tools: cargo-nextest@0.9.131
      - run: cargo fmt --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo clippy --workspace --features k8s -- -D warnings
      - run: cargo nextest run --workspace --no-fail-fast
      - run: cargo nextest run --workspace --no-fail-fast --features k8s

  cross-compile:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: universal-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: butterflyskies/ci-actions/setup-rust@main  # TODO: pin to SHA
        with:
          cache-key: ${{ matrix.target }}
      - run: cargo build --features k8s

  msrv:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: butterflyskies/ci-actions/setup-rust@main  # TODO: pin to SHA
        with:
          toolchain: "1.88"
          cache-key: msrv
      - run: cargo check --workspace --all-features

  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2.0.15
        with:
          command: check

  semver-checks:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: butterflyskies/ci-actions/setup-rust@main  # TODO: pin to SHA
        with:
          cache-key: semver
      - uses: obi1kenobi/cargo-semver-checks-action@5b298c9520f7096a4683c0bd981a7ac5a7e249ae # v2
      - uses: obi1kenobi/cargo-semver-checks-action@5b298c9520f7096a4683c0bd981a7ac5a7e249ae # v2
        with:
          feature-group: only-explicit-features
          features: k8s

  build:
    needs: [test, audit, semver-checks, cross-compile, msrv]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: butterflyskies/ci-actions/docker-publish@main  # TODO: pin to SHA
        with:
          image: ${{ env.IMAGE }}
          push: ${{ github.event_name != 'pull_request' }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
